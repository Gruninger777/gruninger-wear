<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1560" role="img" aria-labelledby="title desc">
  <title id="title">Camiseta Modelo Grüninger Wear</title>
  <desc id="desc">Imagem ilustrativa premium para o catálogo da Grüninger Wear.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1fb86d"/>
      <stop offset="100%" stop-color="#6dffd5"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="1560" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="1420" rx="36" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <ellipse cx="600" cy="590" rx="430" ry="500" fill="rgba(31,184,109,0.15)"/>

  <g filter="url(#softShadow)">
    <path d="M389 287c39-48 119-78 211-78s172 30 211 78l132 93-104 170-79-49v612c0 23-19 42-42 42H472c-23 0-42-19-42-42V501l-79 49-104-170 142-93z" fill="url(#shirt)"/>
    <path d="M512 239c18 41 49 61 88 61s70-20 88-61" fill="none" stroke="#2a2a2a" stroke-width="30" stroke-linecap="round"/>
    <path d="M468 1112h264" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <path d="M468 1148h186" stroke="#2b2b2b" stroke-width="8" stroke-linecap="round"/>
    <text x="600" y="745" fill="#f1f1f1" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" letter-spacing="10" text-anchor="middle">GRÜNINGER</text>
    <text x="600" y="830" fill="#8a8a8a" font-family="Arial, Helvetica, sans-serif" font-size="38" letter-spacing="12" text-anchor="middle">WEAR</text>
    <text x="600" y="1245" fill="#7ae7b1" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="7" text-anchor="middle">MODELO VISUAL PARA O CATÁLOGO</text>
